<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatterPi AI - Interactive Conversation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-header {
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }
        
        .connection-status {
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        
        .status-connected { background: #4caf50; }
        .status-connecting { background: #ff9800; }
        .status-disconnected { background: #f44336; }
        .status-error { background: #9c27b0; }
        
        .character-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            animation: fadeIn 0.3s ease-in;
        }
        
        .message.user {
            align-self: flex-end;
        }
        
        .message.bot {
            align-self: flex-start;
        }
        
        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .message.bot .message-content {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }
        
        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .processing-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            margin: 10px 0;
        }
        
        .processing-indicator.active {
            display: flex;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .chat-input-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .chat-input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.2);
        }
        
        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .send-button {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.4);
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .jaw-status {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .jaw-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #ffcdd2;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🎭 ChatterPi AI</h1>
            <div class="subtitle">Interactive AI Conversation with Jaw Animation</div>
            <div class="status-bar">
                <div class="connection-status status-disconnected" id="connectionStatus">Disconnected</div>
                <div class="character-info">
                    <span id="characterName">Count Orlok</span>
                    <div class="jaw-status">
                        <div class="jaw-indicator" id="jawIndicator"></div>
                        <span id="jawStatusText">Ready</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Greetings, mortal... I am Count Orlok, ancient dweller of the shadows. 
                    Speak, and I shall respond from the depths of my eternal existence... 🦇
                    <div class="message-time" id="welcomeTime"></div>
                </div>
            </div>
        </div>
        
        <div class="processing-indicator" id="processingIndicator">
            <div class="spinner"></div>
            <span>AI is thinking...</span>
        </div>
        
        <div class="chat-input-container">
            <div class="input-wrapper">
                <textarea 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="Type your message to Count Orlok..."
                    rows="1"
                ></textarea>
                <button id="sendButton" class="send-button" disabled>
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script>
        class ChatterPiAIChat {
            constructor() {
                this.initializeElements();
                this.setupEventListeners();
                this.initializeAudio();
                this.connectToServices();
                this.updateWelcomeTime();

                // Connection states
                this.isAIConnected = false;
                this.isJawConnected = false;
                this.isProcessing = false;

                // WebSocket connections
                this.aiWebSocket = null;
                this.jawWebSocket = null;

                // Current character and audio
                this.currentCharacter = 'orlok';
                this.speechSynthesis = window.speechSynthesis;
                this.voices = [];
                this.audioVolume = 0.7;
            }
            
            initializeElements() {
                this.chatMessages = document.getElementById('chatMessages');
                this.chatInput = document.getElementById('chatInput');
                this.sendButton = document.getElementById('sendButton');
                this.connectionStatus = document.getElementById('connectionStatus');
                this.characterName = document.getElementById('characterName');
                this.jawStatusText = document.getElementById('jawStatusText');
                this.jawIndicator = document.getElementById('jawIndicator');
                this.processingIndicator = document.getElementById('processingIndicator');
            }
            
            setupEventListeners() {
                this.sendButton.addEventListener('click', () => this.sendMessage());
                this.chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
                
                this.chatInput.addEventListener('input', () => {
                    this.adjustTextareaHeight();
                    this.updateSendButton();
                });
            }
            
            updateWelcomeTime() {
                const welcomeTime = document.getElementById('welcomeTime');
                if (welcomeTime) {
                    welcomeTime.textContent = new Date().toLocaleTimeString();
                }
            }
            
            adjustTextareaHeight() {
                this.chatInput.style.height = 'auto';
                this.chatInput.style.height = Math.min(this.chatInput.scrollHeight, 120) + 'px';
            }
            
            updateSendButton() {
                const hasText = this.chatInput.value.trim().length > 0;
                this.sendButton.disabled = !hasText || !this.isAIConnected || this.isProcessing;
            }

            initializeAudio() {
                // Wait for voices to load
                if (this.speechSynthesis.getVoices().length === 0) {
                    this.speechSynthesis.addEventListener('voiceschanged', () => {
                        this.voices = this.speechSynthesis.getVoices();
                        console.log('Available voices:', this.voices.map(v => v.name));
                    });
                } else {
                    this.voices = this.speechSynthesis.getVoices();
                }
            }

            getVoiceForCharacter(character) {
                const voicePreferences = {
                    'orlok': ['Microsoft David', 'Google UK English Male', 'Alex', 'Daniel'],
                    'robot': ['Microsoft Zira', 'Google US English', 'Samantha', 'Victoria'],
                    'pirate': ['Microsoft Mark', 'Google UK English Male', 'Fred', 'Ralph']
                };

                const preferences = voicePreferences[character] || voicePreferences['orlok'];

                for (const prefName of preferences) {
                    const voice = this.voices.find(v => v.name.includes(prefName));
                    if (voice) return voice;
                }

                // Fallback to first available voice
                return this.voices[0] || null;
            }

            async speakText(text, character = null) {
                if (!text || !this.speechSynthesis) return;

                // Stop any current speech
                this.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                const voice = this.getVoiceForCharacter(character || this.currentCharacter);

                if (voice) {
                    utterance.voice = voice;
                }

                // Character-specific voice settings
                switch (character || this.currentCharacter) {
                    case 'orlok':
                        utterance.rate = 0.8;
                        utterance.pitch = 0.7;
                        break;
                    case 'robot':
                        utterance.rate = 1.1;
                        utterance.pitch = 0.9;
                        break;
                    case 'pirate':
                        utterance.rate = 0.9;
                        utterance.pitch = 0.8;
                        break;
                    default:
                        utterance.rate = 1.0;
                        utterance.pitch = 1.0;
                }

                utterance.volume = this.audioVolume;

                this.speechSynthesis.speak(utterance);
            }
            
            async connectToServices() {
                await this.connectToAI();
                await this.connectToJawControl();
            }
            
            async connectToAI() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.hostname}:8766`;

                try {
                    this.aiWebSocket = new WebSocket(wsUrl);

                    this.aiWebSocket.onopen = () => {
                        console.log('✅ Connected to AI WebSocket');
                        this.isAIConnected = true;
                        this.updateConnectionStatus();
                        this.updateSendButton();
                    };

                    this.aiWebSocket.onmessage = (event) => {
                        this.handleAIMessage(JSON.parse(event.data));
                    };

                    this.aiWebSocket.onclose = () => {
                        console.log('❌ Disconnected from AI WebSocket');
                        this.isAIConnected = false;
                        this.updateConnectionStatus();
                        this.updateSendButton();
                        setTimeout(() => this.connectToAI(), 5000);
                    };

                    this.aiWebSocket.onerror = (error) => {
                        console.error('AI WebSocket error:', error);
                        this.showError('Failed to connect to AI service');
                    };

                } catch (error) {
                    console.error('Failed to create AI WebSocket:', error);
                    this.showError('AI service unavailable');
                    setTimeout(() => this.connectToAI(), 5000);
                }
            }

            async connectToJawControl() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.hostname}:8765`;

                try {
                    this.jawWebSocket = new WebSocket(wsUrl);

                    this.jawWebSocket.onopen = () => {
                        console.log('✅ Connected to Jaw Control WebSocket');
                        this.isJawConnected = true;
                        this.updateJawStatus('Connected');
                    };

                    this.jawWebSocket.onmessage = (event) => {
                        this.handleJawMessage(JSON.parse(event.data));
                    };

                    this.jawWebSocket.onclose = () => {
                        console.log('❌ Disconnected from Jaw Control WebSocket');
                        this.isJawConnected = false;
                        this.updateJawStatus('Disconnected');
                        setTimeout(() => this.connectToJawControl(), 5000);
                    };

                    this.jawWebSocket.onerror = (error) => {
                        console.warn('Jaw WebSocket error:', error);
                        this.updateJawStatus('Error');
                    };

                } catch (error) {
                    console.warn('Failed to create Jaw WebSocket:', error);
                    this.updateJawStatus('Unavailable');
                    setTimeout(() => this.connectToJawControl(), 5000);
                }
            }

            handleAIMessage(message) {
                console.log('AI Message:', message);

                switch (message.type) {
                    case 'welcome':
                        this.characterName.textContent = message.character || 'Count Orlok';
                        break;

                    case 'processing_started':
                        this.setProcessing(true);
                        break;

                    case 'conversation_result':
                        this.setProcessing(false);
                        if (message.data && message.data.aiResponse) {
                            this.addMessage(message.data.aiResponse.text, 'bot');
                            // Speak the AI response
                            this.speakText(message.data.aiResponse.text, message.data.aiResponse.voice);
                        }
                        break;

                    case 'processing_error':
                        this.setProcessing(false);
                        this.showError(`AI Error: ${message.error}`);
                        break;

                    case 'ai_error':
                        this.showError(`AI Service Error: ${message.error}`);
                        break;
                }
            }

            handleJawMessage(message) {
                console.log('Jaw Message:', message);

                switch (message.type) {
                    case 'welcome':
                        this.updateJawStatus('Ready');
                        break;

                    case 'jaw_move_started':
                        this.updateJawStatus(`Moving to ${message.angle}°`);
                        break;

                    case 'jaw_stopped':
                        this.updateJawStatus('Ready');
                        break;

                    case 'status_response':
                        if (message.jaw_status) {
                            this.updateJawStatus(message.jaw_status.is_moving ? 'Moving' : 'Ready');
                        }
                        break;
                }
            }

            sendMessage() {
                const message = this.chatInput.value.trim();
                if (!message || !this.isAIConnected || this.isProcessing) return;

                // Add user message to chat
                this.addMessage(message, 'user');

                // Clear input
                this.chatInput.value = '';
                this.adjustTextareaHeight();
                this.updateSendButton();

                // Send to AI
                this.sendAIMessage({
                    type: 'chat_message',
                    text: message,
                    timestamp: new Date().toISOString()
                });
            }

            sendAIMessage(message) {
                if (this.aiWebSocket && this.aiWebSocket.readyState === WebSocket.OPEN) {
                    this.aiWebSocket.send(JSON.stringify(message));
                }
            }

            addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = `
                    ${text}
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                `;

                messageDiv.appendChild(contentDiv);
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            setProcessing(isProcessing) {
                this.isProcessing = isProcessing;
                this.processingIndicator.classList.toggle('active', isProcessing);
                this.updateSendButton();
            }

            updateConnectionStatus() {
                const status = this.isAIConnected ? 'connected' : 'disconnected';
                this.connectionStatus.className = `connection-status status-${status}`;
                this.connectionStatus.textContent = this.isAIConnected ? 'Connected' : 'Disconnected';
            }

            updateJawStatus(status) {
                this.jawStatusText.textContent = status;
                this.jawIndicator.style.background = this.isJawConnected ? '#4caf50' : '#f44336';
            }

            showError(message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;

                this.chatMessages.appendChild(errorDiv);
                this.scrollToBottom();

                // Remove error after 5 seconds
                setTimeout(() => {
                    if (errorDiv.parentNode) {
                        errorDiv.parentNode.removeChild(errorDiv);
                    }
                }, 5000);
            }

            scrollToBottom() {
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ChatterPiAIChat();
        });
    </script>
</body>
</html>
