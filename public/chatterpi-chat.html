<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatterPi - Interactive Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .chat-container {
            width: 90%; max-width: 800px; height: 90vh; background: white;
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px; text-align: center; position: relative;
        }
        .chat-header h1 { font-size: 24px; margin-bottom: 5px; }
        .chat-header .subtitle { font-size: 14px; opacity: 0.9; }
        .connection-status {
            position: absolute; top: 20px; right: 20px; padding: 5px 10px;
            border-radius: 15px; font-size: 12px; font-weight: bold;
        }
        .status-connected { background: #4CAF50; color: white; }
        .status-disconnected { background: #f44336; color: white; }
        .status-connecting { background: #ff9800; color: white; }
        .status-partial { background: #2196F3; color: white; }
        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; background: #f8f9fa;
        }
        .message { margin-bottom: 15px; display: flex; align-items: flex-start; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content {
            max-width: 70%; padding: 12px 16px; border-radius: 18px;
            font-size: 14px; line-height: 1.4; position: relative;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-bottom-right-radius: 4px;
        }
        .message.bot .message-content {
            background: white; color: #333; border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .message-time { font-size: 11px; opacity: 0.7; margin-top: 4px; }
        .jaw-status {
            padding: 10px 20px; background: #f0f0f0; border-top: 1px solid #e0e0e0;
            font-size: 12px; color: #666; display: flex;
            justify-content: space-between; align-items: center;
        }
        .jaw-position { font-weight: bold; color: #667eea; }
        .controls-panel {
            padding: 15px 20px; background: #f8f9fa; border-top: 1px solid #e0e0e0;
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .control-group {
            display: flex; flex-direction: column; gap: 5px;
        }
        .control-group label {
            font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase;
        }
        .control-select, .control-button {
            padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 12px; background: white; cursor: pointer;
        }
        .control-select:focus, .control-button:hover {
            border-color: #667eea; outline: none;
        }
        .control-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; transition: transform 0.2s;
        }
        .control-button:hover { transform: scale(1.05); }
        .control-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .audio-controls {
            display: flex; gap: 10px; align-items: center;
        }
        .volume-control {
            display: flex; align-items: center; gap: 8px;
        }
        .volume-slider {
            width: 80px; height: 4px; background: #ddd; border-radius: 2px;
            outline: none; cursor: pointer;
        }
        .chat-input-container {
            padding: 20px; background: white; border-top: 1px solid #e0e0e0;
        }
        .chat-input-wrapper { display: flex; gap: 10px; align-items: flex-end; }
        .chat-input {
            flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0;
            border-radius: 25px; font-size: 14px; resize: none; outline: none;
            transition: border-color 0.3s; max-height: 100px; min-height: 44px;
        }
        .chat-input:focus { border-color: #667eea; }
        .send-button {
            width: 44px; height: 44px; border: none; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: transform 0.2s;
        }
        .send-button:hover { transform: scale(1.05); }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🎭 ChatterPi</h1>
            <div class="subtitle">Interactive AI Conversation with Jaw Animation</div>
            <div class="connection-status status-disconnected" id="connectionStatus">Disconnected</div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Welcome to ChatterPi! I'm an interactive AI character with jaw animation. 
                    Type a message to start our conversation! 🦴
                    <div class="message-time" id="welcomeTime"></div>
                </div>
            </div>
        </div>
        <div class="jaw-status" id="jawStatus">
            <span>Jaw Position: <span class="jaw-position" id="jawPosition">0°</span></span>
            <span>Status: <span id="jawStatusText">Initializing...</span></span>
        </div>
        <div class="controls-panel">
            <div class="control-group">
                <label>Servo Selection</label>
                <select id="servoSelect" class="control-select">
                    <option value="18">GPIO 18 (ChatterPi Jaw)</option>
                    <option value="19">GPIO 19 (Aux Servo 1)</option>
                    <option value="20">GPIO 20 (Aux Servo 2)</option>
                    <option value="21">GPIO 21 (Aux Servo 3)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Character Voice</label>
                <select id="voiceSelect" class="control-select">
                    <option value="orlok">Count Orlok (Deep)</option>
                    <option value="robot">RoboChat (Robotic)</option>
                    <option value="pirate">Captain Blackbeard (Gruff)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Audio Controls</label>
                <div class="audio-controls">
                    <button id="testAudioButton" class="control-button">Test Voice</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
                    </div>
                </div>
            </div>
            <div class="control-group">
                <label>Jaw Test</label>
                <button id="testJawButton" class="control-button">Test Movement</button>
            </div>
        </div>
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="Type your message here..." rows="1"></textarea>
                <button class="send-button" id="sendButton" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        class ChatterPiChat {
            constructor() {
                // WebSocket connections
                this.jawWebSocket = null;
                this.aiWebSocket = null;
                this.isJawConnected = false;
                this.isAIConnected = false;

                // Configuration
                this.selectedServo = 18;
                this.selectedVoice = 'orlok';
                this.audioVolume = 0.7;
                this.speechSynthesis = window.speechSynthesis;
                this.voices = [];

                // Initialize
                this.initializeElements();
                this.setupEventListeners();
                this.initializeAudio();
                this.connectToServices();
                this.updateWelcomeTime();
            }

            initializeElements() {
                this.chatMessages = document.getElementById('chatMessages');
                this.chatInput = document.getElementById('chatInput');
                this.sendButton = document.getElementById('sendButton');
                this.connectionStatus = document.getElementById('connectionStatus');
                this.jawPosition = document.getElementById('jawPosition');
                this.jawStatusText = document.getElementById('jawStatusText');
                this.servoSelect = document.getElementById('servoSelect');
                this.voiceSelect = document.getElementById('voiceSelect');
                this.testAudioButton = document.getElementById('testAudioButton');
                this.testJawButton = document.getElementById('testJawButton');
                this.volumeSlider = document.getElementById('volumeSlider');
            }

            setupEventListeners() {
                this.sendButton.addEventListener('click', () => this.sendMessage());
                this.chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
                this.chatInput.addEventListener('input', () => {
                    this.adjustTextareaHeight();
                    this.updateSendButton();
                });

                // Control panel event listeners
                this.servoSelect.addEventListener('change', (e) => {
                    this.selectedServo = parseInt(e.target.value);
                    console.log(`Servo changed to GPIO ${this.selectedServo}`);
                });

                this.voiceSelect.addEventListener('change', (e) => {
                    this.selectedVoice = e.target.value;
                    console.log(`Voice changed to ${this.selectedVoice}`);
                });

                this.testAudioButton.addEventListener('click', () => this.testAudio());
                this.testJawButton.addEventListener('click', () => this.testJawMovement());

                this.volumeSlider.addEventListener('input', (e) => {
                    this.audioVolume = e.target.value / 100;
                });
            }

            updateWelcomeTime() {
                const welcomeTime = document.getElementById('welcomeTime');
                if (welcomeTime) {
                    welcomeTime.textContent = new Date().toLocaleTimeString();
                }
            }

            initializeAudio() {
                // Wait for voices to load
                if (this.speechSynthesis.getVoices().length === 0) {
                    this.speechSynthesis.addEventListener('voiceschanged', () => {
                        this.voices = this.speechSynthesis.getVoices();
                        console.log('Available voices:', this.voices.map(v => v.name));
                    });
                } else {
                    this.voices = this.speechSynthesis.getVoices();
                }
            }

            getVoiceForCharacter(character) {
                const voicePreferences = {
                    'orlok': ['Microsoft David', 'Google UK English Male', 'Alex', 'Daniel'],
                    'robot': ['Microsoft Zira', 'Google US English', 'Samantha', 'Victoria'],
                    'pirate': ['Microsoft Mark', 'Google UK English Male', 'Fred', 'Ralph']
                };

                const preferences = voicePreferences[character] || voicePreferences['orlok'];

                for (const prefName of preferences) {
                    const voice = this.voices.find(v => v.name.includes(prefName));
                    if (voice) return voice;
                }

                // Fallback to first available voice
                return this.voices[0] || null;
            }

            async speakText(text, character = null) {
                if (!text || !this.speechSynthesis) return;

                // Stop any current speech
                this.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                const voice = this.getVoiceForCharacter(character || this.selectedVoice);

                if (voice) {
                    utterance.voice = voice;
                }

                // Character-specific voice settings
                switch (character || this.selectedVoice) {
                    case 'orlok':
                        utterance.rate = 0.8;
                        utterance.pitch = 0.7;
                        break;
                    case 'robot':
                        utterance.rate = 1.1;
                        utterance.pitch = 0.9;
                        break;
                    case 'pirate':
                        utterance.rate = 0.9;
                        utterance.pitch = 0.8;
                        break;
                    default:
                        utterance.rate = 1.0;
                        utterance.pitch = 1.0;
                }

                utterance.volume = this.audioVolume;

                // Synchronize jaw movement with speech
                utterance.onstart = () => {
                    this.animateJawWithSpeech(text);
                };

                this.speechSynthesis.speak(utterance);
            }

            testAudio() {
                const testMessages = {
                    'orlok': "Greetings, mortal... I am Count Orlok, ancient dweller of the shadows...",
                    'robot': "SYSTEM STATUS: Audio test initiated. All circuits functioning normally.",
                    'pirate': "Ahoy there, matey! This be Captain Blackbeard speakin'!"
                };

                const message = testMessages[this.selectedVoice] || testMessages['orlok'];
                this.speakText(message, this.selectedVoice);
            }

            adjustTextareaHeight() {
                this.chatInput.style.height = 'auto';
                this.chatInput.style.height = Math.min(this.chatInput.scrollHeight, 100) + 'px';
            }

            updateSendButton() {
                const hasText = this.chatInput.value.trim().length > 0;
                this.sendButton.disabled = !hasText || !this.isAIConnected;
            }

            connectToServices() {
                this.connectToJawControl();
                this.connectToAI();
            }

            connectToJawControl() {
                const wsUrl = `ws://${window.location.hostname}:8765`;

                try {
                    this.jawWebSocket = new WebSocket(wsUrl);

                    this.jawWebSocket.onopen = () => {
                        console.log('✅ Connected to Jaw Control WebSocket');
                        this.isJawConnected = true;
                        this.updateConnectionStatus();
                        this.sendJawMessage({
                            type: 'subscribe',
                            events: ['jaw_movement', 'jaw_stopped']
                        });
                        this.sendJawMessage({ type: 'get_status' });
                    };

                    this.jawWebSocket.onmessage = (event) => {
                        this.handleJawMessage(JSON.parse(event.data));
                    };

                    this.jawWebSocket.onclose = () => {
                        console.log('❌ Disconnected from Jaw Control WebSocket');
                        this.isJawConnected = false;
                        this.updateConnectionStatus();
                        setTimeout(() => this.connectToJawControl(), 5000);
                    };

                    this.jawWebSocket.onerror = (error) => {
                        console.warn('Jaw WebSocket error:', error);
                    };

                } catch (error) {
                    console.error('Failed to create Jaw WebSocket:', error);
                    setTimeout(() => this.connectToJawControl(), 5000);
                }
            }

            connectToAI() {
                const wsUrl = `ws://${window.location.hostname}:8766`;

                try {
                    this.aiWebSocket = new WebSocket(wsUrl);

                    this.aiWebSocket.onopen = () => {
                        console.log('✅ Connected to AI WebSocket');
                        this.isAIConnected = true;
                        this.updateConnectionStatus();
                        this.updateSendButton();

                        // Set character to Count Orlok
                        this.sendAIMessage({
                            type: 'set_character',
                            character: 'orlok'
                        });
                    };

                    this.aiWebSocket.onmessage = (event) => {
                        this.handleAIMessage(JSON.parse(event.data));
                    };

                    this.aiWebSocket.onclose = () => {
                        console.log('❌ Disconnected from AI WebSocket');
                        this.isAIConnected = false;
                        this.updateConnectionStatus();
                        this.updateSendButton();
                        setTimeout(() => this.connectToAI(), 5000);
                    };

                    this.aiWebSocket.onerror = (error) => {
                        console.error('AI WebSocket error:', error);
                    };

                } catch (error) {
                    console.error('Failed to create AI WebSocket:', error);
                    setTimeout(() => this.connectToAI(), 5000);
                }
            }

            sendJawMessage(message) {
                if (this.jawWebSocket && this.jawWebSocket.readyState === WebSocket.OPEN) {
                    this.jawWebSocket.send(JSON.stringify(message));
                }
            }

            sendAIMessage(message) {
                if (this.aiWebSocket && this.aiWebSocket.readyState === WebSocket.OPEN) {
                    this.aiWebSocket.send(JSON.stringify(message));
                }
            }

            handleJawMessage(message) {
                console.log('Jaw message received:', message);

                switch (message.type) {
                    case 'welcome':
                        this.jawStatusText.textContent = 'Connected';
                        break;
                    case 'status_response':
                        this.updateJawStatus(message.jaw_status);
                        break;
                    case 'jaw_move_started':
                        this.jawStatusText.textContent = `Moving to ${message.angle}°`;
                        break;
                    case 'jaw_stopped':
                        this.jawStatusText.textContent = 'Stopped';
                        break;
                    case 'error':
                        console.error('Jaw WebSocket error:', message.message);
                        break;
                }
            }

            handleAIMessage(message) {
                console.log('AI message received:', message);

                switch (message.type) {
                    case 'conversation_result':
                        const data = message.data;
                        this.addMessage(data.aiResponse.text, 'bot');

                        // Speak with character voice and animate jaw
                        this.speakText(data.aiResponse.text, this.selectedVoice);
                        this.animateJawWithSpeech(data.aiResponse.text);
                        break;

                    case 'ai_error':
                        console.error('AI Error:', message.error);
                        this.addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                        break;

                    case 'characters_list':
                        console.log('Available characters:', message.characters);
                        break;
                }
            }

            updateConnectionStatus() {
                let statusText = '';
                let statusClass = '';

                if (this.isAIConnected && this.isJawConnected) {
                    statusText = 'Connected (AI + Jaw)';
                    statusClass = 'status-connected';
                } else if (this.isAIConnected) {
                    statusText = 'AI Connected';
                    statusClass = 'status-partial';
                } else if (this.isJawConnected) {
                    statusText = 'Jaw Connected';
                    statusClass = 'status-partial';
                } else {
                    statusText = 'Connecting...';
                    statusClass = 'status-connecting';
                }

                this.connectionStatus.className = `connection-status ${statusClass}`;
                this.connectionStatus.textContent = statusText;
            }

            updateJawStatus(jawStatus) {
                if (jawStatus.current_position !== null) {
                    this.jawPosition.textContent = `${jawStatus.current_position.toFixed(1)}°`;
                }
                this.jawStatusText.textContent = jawStatus.is_moving ? 'Moving' : 'Ready';
            }

            sendMessage() {
                const message = this.chatInput.value.trim();
                if (!message || !this.isAIConnected) return;

                this.addMessage(message, 'user');
                this.chatInput.value = '';
                this.adjustTextareaHeight();
                this.updateSendButton();

                // Send message to AI
                this.sendAIMessage({
                    type: 'chat_message',
                    message: message,
                    timestamp: new Date().toISOString()
                });
            }

            testJawMovement() {
                console.log(`Testing jaw movement on GPIO ${this.selectedServo}`);

                // Send servo configuration first
                this.sendJawMessage({
                    type: 'configure_servo',
                    pin: parseInt(this.selectedServo)
                });

                // Wait a moment for configuration, then test
                setTimeout(() => {
                    // Test sequence with proper jaw angles (inverted for correct orientation)
                    const testSequence = [
                        { angle: 90, duration: 0.5 },   // Closed position
                        { angle: 60, duration: 0.5 },   // Slightly open
                        { angle: 30, duration: 0.5 },   // More open
                        { angle: 60, duration: 0.5 },   // Back to slightly open
                        { angle: 90, duration: 0.5 }    // Back to closed
                    ];

                    testSequence.forEach((move, index) => {
                        setTimeout(() => {
                            this.sendJawMessage({
                                type: 'jaw_move',
                                angle: move.angle,
                                duration: move.duration,
                                curve_type: 'ease_in_out'
                            });
                            console.log(`🦴 Jaw command sent: ${move.angle}° for ${move.duration}s`);
                        }, index * 700);
                    });
                }, 200);
            }

            animateJawWithSpeech(text) {
                const words = text.split(' ');
                let delay = 0;

                words.forEach((word, index) => {
                    setTimeout(() => {
                        // Calculate jaw opening based on word length (inverted angles)
                        const openAmount = Math.min(30, word.length * 3);
                        const jawAngle = 90 - openAmount; // 90 = closed, lower = more open

                        this.sendJawMessage({
                            type: 'jaw_move',
                            angle: jawAngle,
                            duration: 0.15,
                            curve_type: 'ease_out'
                        });

                        // Close jaw after speaking word
                        setTimeout(() => {
                            this.sendJawMessage({
                                type: 'jaw_move',
                                angle: 90, // Closed position
                                duration: 0.1,
                                curve_type: 'ease_in'
                            });
                        }, 150);

                    }, delay);

                    delay += 250;
                });
            }

            simulateJawMovement(text) {
                // Use the new speech-synchronized animation
                this.animateJawWithSpeech(text);
            }

            addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = `
                    ${text}
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                `;
                
                messageDiv.appendChild(contentDiv);
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addBotResponse(userMessage) {
                const characterResponses = {
                    'orlok': [
                        "Ah, mortal... your words echo through the shadows of eternity...",
                        "Indeed, from my centuries of existence, I have observed such things...",
                        "The darkness whispers secrets that few dare to comprehend...",
                        "Your mortal perspective intrigues me, young one...",
                        "In my long existence, I have seen many such matters unfold..."
                    ],
                    'robot': [
                        "PROCESSING... That is a logical observation, human.",
                        "ANALYSIS COMPLETE: Your input has been processed successfully.",
                        "INTERESTING DATA: Please provide additional parameters.",
                        "SYSTEM STATUS: Ready to assist with your query.",
                        "COMPUTATION RESULT: I understand your request."
                    ],
                    'pirate': [
                        "Arrr, that be a fine tale ye be tellin', matey!",
                        "Shiver me timbers! That's quite the adventure!",
                        "Aye, I've sailed the seven seas and seen such things!",
                        "Batten down the hatches! That's a story worth tellin'!",
                        "Yo ho ho! That reminds me of me days on the high seas!"
                    ]
                };

                const responses = characterResponses[this.selectedVoice] || characterResponses['orlok'];
                const response = responses[Math.floor(Math.random() * responses.length)];

                this.addMessage(response, 'bot');

                // Speak the response with character voice
                this.speakText(response, this.selectedVoice);
            }

            scrollToBottom() {
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ChatterPiChat();
        });
    </script>
</body>
</html>
