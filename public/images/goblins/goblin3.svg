  <!-- Goofy eyebrows -->
  <path d="M 90 110 Q 105 115 120 110" stroke="#ea580c" stroke-width="3" fill="none"/>
  <path d="M 136 110 Q 151 115 166 110" stroke="#ea580c" stroke-width="3" fill="none"/>
  
  <!-- Label -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fb923c" text-anchor="middle">GOBLIN 3</text>
