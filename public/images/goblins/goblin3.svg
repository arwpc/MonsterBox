<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="#7c2d12"/>
  
  <!-- Goblin face -->
  <ellipse cx="128" cy="140" rx="80" ry="90" fill="#fb923c"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="120" rx="25" ry="35" fill="#fb923c"/>
  <ellipse cx="196" cy="120" rx="25" ry="35" fill="#fb923c"/>
  
  <!-- Eyes -->
  <ellipse cx="105" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <ellipse cx="151" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <circle cx="105" cy="130" r="8" fill="#1a202c"/>
  <circle cx="151" cy="130" r="8" fill="#1a202c"/>
  <circle cx="108" cy="127" r="3" fill="#ffffff"/>
  <circle cx="154" cy="127" r="3" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="128" cy="145" rx="8" ry="12" fill="#f97316"/>
  
  <!-- Mouth (silly) -->
  <ellipse cx="128" cy="165" rx="20" ry="12" fill="#1a202c"/>
  <ellipse cx="128" cy="163" rx="18" ry="10" fill="#dc2626"/>
  
  <!-- Tongue -->
