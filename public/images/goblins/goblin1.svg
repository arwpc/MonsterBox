<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="#1a472a"/>
  
  <!-- Goblin face -->
  <ellipse cx="128" cy="140" rx="80" ry="90" fill="#4ade80"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="120" rx="25" ry="35" fill="#4ade80"/>
  <ellipse cx="196" cy="120" rx="25" ry="35" fill="#4ade80"/>
  
  <!-- Eyes -->
  <ellipse cx="105" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <ellipse cx="151" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <circle cx="105" cy="130" r="8" fill="#1a202c"/>
  <circle cx="151" cy="130" r="8" fill="#1a202c"/>
  <circle cx="108" cy="127" r="3" fill="#ffffff"/>
  <circle cx="154" cy="127" r="3" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="128" cy="145" rx="8" ry="12" fill="#22c55e"/>
  
  <!-- Mouth -->
  <path d="M 105 160 Q 128 175 151 160" stroke="#1a202c" stroke-width="3" fill="none"/>
  
  <!-- Teeth -->
  <rect x="115" y="165" width="6" height="8" fill="#ffffff"/>
  <rect x="135" y="165" width="6" height="8" fill="#ffffff"/>
  
  <!-- Eyebrows -->
  <path d="M 90 110 Q 105 105 120 110" stroke="#166534" stroke-width="3" fill="none"/>
  <path d="M 136 110 Q 151 105 166 110" stroke="#166534" stroke-width="3" fill="none"/>
  
  <!-- Label -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4ade80" text-anchor="middle">GOBLIN 1</text>
</svg>

