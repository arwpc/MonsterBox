<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="#374151"/>
  
  <!-- Goblin face -->
  <ellipse cx="128" cy="140" rx="80" ry="90" fill="#9ca3af"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="120" rx="25" ry="35" fill="#9ca3af"/>
  <ellipse cx="196" cy="120" rx="25" ry="35" fill="#9ca3af"/>
  
  <!-- Eyes -->
  <ellipse cx="105" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <ellipse cx="151" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <circle cx="105" cy="130" r="8" fill="#1a202c"/>
  <circle cx="151" cy="130" r="8" fill="#1a202c"/>
  <circle cx="108" cy="127" r="3" fill="#ffffff"/>
  <circle cx="154" cy="127" r="3" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="128" cy="145" rx="8" ry="12" fill="#6b7280"/>
  
  <!-- Mouth -->
  <path d="M 105 165 L 151 165" stroke="#1a202c" stroke-width="3" fill="none"/>
  
  <!-- Eyebrows -->
  <path d="M 90 110 L 120 110" stroke="#4b5563" stroke-width="3" fill="none"/>
  <path d="M 136 110 L 166 110" stroke="#4b5563" stroke-width="3" fill="none"/>
  
  <!-- Label -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#9ca3af" text-anchor="middle">GOBLIN</text>
</svg>

