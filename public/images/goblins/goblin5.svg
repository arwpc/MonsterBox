<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="#831843"/>
  
  <!-- Goblin face -->
  <ellipse cx="128" cy="140" rx="80" ry="90" fill="#f472b6"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="120" rx="25" ry="35" fill="#f472b6"/>
  <ellipse cx="196" cy="120" rx="25" ry="35" fill="#f472b6"/>
  
  <!-- Eyes (cute) -->
  <ellipse cx="105" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <ellipse cx="151" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <circle cx="105" cy="130" r="10" fill="#1a202c"/>
  <circle cx="151" cy="130" r="10" fill="#1a202c"/>
  <circle cx="109" cy="126" r="4" fill="#ffffff"/>
  <circle cx="155" cy="126" r="4" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="128" cy="145" rx="8" ry="12" fill="#ec4899"/>
  
  <!-- Mouth (happy) -->
  <path d="M 105 165 Q 128 178 151 165" stroke="#1a202c" stroke-width="3" fill="none"/>
  
  <!-- Rosy cheeks -->
  <ellipse cx="85" cy="150" rx="12" ry="8" fill="#f9a8d4" opacity="0.6"/>
  <ellipse cx="171" cy="150" rx="12" ry="8" fill="#f9a8d4" opacity="0.6"/>
  
  <!-- Eyebrows (happy) -->
  <path d="M 90 112 Q 105 108 120 112" stroke="#be185d" stroke-width="3" fill="none"/>
  <path d="M 136 112 Q 151 108 166 112" stroke="#be185d" stroke-width="3" fill="none"/>
  
  <!-- Label -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f472b6" text-anchor="middle">GOBLIN 5</text>
</svg>

