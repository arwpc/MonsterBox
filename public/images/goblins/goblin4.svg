<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="#1e3a8a"/>
  
  <!-- Goblin face -->
  <ellipse cx="128" cy="140" rx="80" ry="90" fill="#60a5fa"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="120" rx="25" ry="35" fill="#60a5fa"/>
  <ellipse cx="196" cy="120" rx="25" ry="35" fill="#60a5fa"/>
  
  <!-- Eyes (sleepy) -->
  <ellipse cx="105" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <ellipse cx="151" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <circle cx="105" cy="130" r="8" fill="#1a202c"/>
  <circle cx="151" cy="130" r="8" fill="#1a202c"/>
  <circle cx="108" cy="127" r="3" fill="#ffffff"/>
  <circle cx="154" cy="127" r="3" fill="#ffffff"/>
  
  <!-- Droopy eyelids -->
  <path d="M 90 120 Q 105 125 120 120" stroke="#1e40af" stroke-width="2" fill="none"/>
  <path d="M 136 120 Q 151 125 166 120" stroke="#1e40af" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <ellipse cx="128" cy="145" rx="8" ry="12" fill="#3b82f6"/>
  
  <!-- Mouth (yawning) -->
  <ellipse cx="128" cy="168" rx="15" ry="18" fill="#1a202c"/>
  <ellipse cx="128" cy="165" rx="13" ry="15" fill="#dc2626"/>
  
  <!-- Eyebrows -->
  <path d="M 90 108 Q 105 110 120 108" stroke="#1e40af" stroke-width="3" fill="none"/>
  <path d="M 136 108 Q 151 110 166 108" stroke="#1e40af" stroke-width="3" fill="none"/>
  
  <!-- Label -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#60a5fa" text-anchor="middle">GOBLIN 4</text>
</svg>

