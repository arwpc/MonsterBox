<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="#4c1d95"/>
  
  <!-- Goblin face -->
  <ellipse cx="128" cy="140" rx="80" ry="90" fill="#a78bfa"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="120" rx="25" ry="35" fill="#a78bfa"/>
  <ellipse cx="196" cy="120" rx="25" ry="35" fill="#a78bfa"/>
  
  <!-- Eyes -->
  <ellipse cx="105" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <ellipse cx="151" cy="125" rx="15" ry="20" fill="#fef08a"/>
  <circle cx="105" cy="130" r="8" fill="#1a202c"/>
  <circle cx="151" cy="130" r="8" fill="#1a202c"/>
  <circle cx="108" cy="127" r="3" fill="#ffffff"/>
  <circle cx="154" cy="127" r="3" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="128" cy="145" rx="8" ry="12" fill="#8b5cf6"/>
  
  <!-- Mouth (evil grin) -->
  <path d="M 100 160 Q 128 180 156 160" stroke="#1a202c" stroke-width="3" fill="none"/>
  
  <!-- Sharp teeth -->
  <polygon points="110,165 115,175 120,165" fill="#ffffff"/>
  <polygon points="125,165 130,175 135,165" fill="#ffffff"/>
  <polygon points="140,165 145,175 150,165" fill="#ffffff"/>
  
  <!-- Angry eyebrows -->
  <path d="M 90 105 L 120 115" stroke="#6d28d9" stroke-width="4" fill="none"/>
  <path d="M 166 105 L 136 115" stroke="#6d28d9" stroke-width="4" fill="none"/>
  
  <!-- Label -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#a78bfa" text-anchor="middle">GOBLIN 2</text>
</svg>

