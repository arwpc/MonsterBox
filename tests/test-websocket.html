<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function log(message) {
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            results.appendChild(div);
            console.log(message);
        }
        
        function testWebSocket(port, name) {
            return new Promise((resolve) => {
                try {
                    const ws = new WebSocket(`ws://localhost:${port}`);
                    
                    const timeout = setTimeout(() => {
                        log(`❌ ${name} (${port}): Connection timeout`);
                        ws.close();
                        resolve(false);
                    }, 5000);
                    
                    ws.onopen = () => {
                        clearTimeout(timeout);
                        log(`✅ ${name} (${port}): Connected successfully`);
                        
                        // Send a ping
                        ws.send(JSON.stringify({type: 'ping'}));
                        
                        setTimeout(() => {
                            ws.close();
                            resolve(true);
                        }, 1000);
                    };
                    
                    ws.onmessage = (event) => {
                        log(`📨 ${name} (${port}): Received: ${event.data}`);
                    };
                    
                    ws.onclose = (event) => {
                        clearTimeout(timeout);
                        log(`🔌 ${name} (${port}): Connection closed (code: ${event.code})`);
                    };
                    
                    ws.onerror = (error) => {
                        clearTimeout(timeout);
                        log(`❌ ${name} (${port}): Connection error`);
                        resolve(false);
                    };
                    
                } catch (error) {
                    log(`❌ ${name} (${port}): Exception: ${error.message}`);
                    resolve(false);
                }
            });
        }
        
        async function runTests() {
            log('Starting WebSocket connection tests...');
            
            const services = [
                [8770, 'Service Registry'],
                [8780, 'Main Hardware Server'],
                [8771, 'Motor Service'],
                [8772, 'Light Service']
            ];
            
            for (const [port, name] of services) {
                await testWebSocket(port, name);
                await new Promise(resolve => setTimeout(resolve, 500)); // Small delay between tests
            }
            
            log('All tests completed');
        }
        
        // Start tests when page loads
        window.addEventListener('load', () => {
            setTimeout(runTests, 2000); // Wait 2 seconds for services to be ready
        });
    </script>
</body>
</html>
