<!DOCTYPE html>
<html>
<head>
    <title>Stream Test</title>
</head>
<body>
    <h1>Webcam Stream Test</h1>
    <div>
        <button onclick="startStream()">Start Stream</button>
        <button onclick="stopStream()">Stop Stream</button>
    </div>
    <div>
        <img id="streamImg" style="display:none; max-width: 640px; border: 2px solid #ccc;" />
        <div id="noStream">No stream active</div>
    </div>
    
    <script>
        function startStream() {
            console.log('Starting stream test...');
            const img = document.getElementById('streamImg');
            const noStream = document.getElementById('noStream');
            
            // Test with webcam ID 7 (Orlok's Gaze)
            const streamUrl = '/setup/webcam/api/parts/7/stream?_ts=' + Date.now();
            console.log('Stream URL:', streamUrl);
            
            img.onload = function() {
                console.log('✅ Stream loaded successfully');
                img.style.display = 'block';
                noStream.style.display = 'none';
            };
            
            img.onerror = function() {
                console.error('❌ Stream failed to load');
                alert('Stream failed to load');
            };
            
            img.src = streamUrl;
        }
        
        function stopStream() {
            console.log('Stopping stream...');
            const img = document.getElementById('streamImg');
            const noStream = document.getElementById('noStream');
            
            img.src = '';
            img.style.display = 'none';
            noStream.style.display = 'block';
        }
    </script>
</body>
</html>
