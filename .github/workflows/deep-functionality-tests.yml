name: MonsterBox Deep Functionality Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - critical-only
          - characters
          - hardware
          - ai
          - sounds
          - chatterpi
          - integration
      headed:
        description: 'Run tests in headed mode'
        required: false
        default: false
        type: boolean

jobs:
  deep-functionality-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        node-version: [20.x]
        browser: [chromium]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        npx playwright install --with-deps ${{ matrix.browser }}

    - name: Setup test environment
      run: |
        mkdir -p test-results/screenshots
        mkdir -p test-results/reports
        mkdir -p test-results/temp-files

    - name: Start MonsterBox application
      run: |
        MB_TEST_MODE=1 npm start &
        APP_PID=$!
        echo "APP_PID=$APP_PID" >> $GITHUB_ENV
        sleep 15
        # Wait for application to be ready with timeout
        for i in {1..30}; do
          if curl -f http://localhost:3000 2>/dev/null; then
            echo "Application is ready"
            exit 0
          fi
          echo "Waiting for application... attempt $i/30"
          sleep 2
        done
        echo "Application failed to start"
        kill $APP_PID 2>/dev/null || true
        exit 1
      env:
        NODE_ENV: test
        PORT: 3000

    - name: Run Deep Functionality Tests - All Suites
      if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == ''
      run: |
        npm run test:deep
      env:
        BROWSER: ${{ matrix.browser }}
        HEADED: ${{ github.event.inputs.headed || 'false' }}

    - name: Run Deep Functionality Tests - Critical Only
      if: github.event.inputs.test_suite == 'critical-only'
      run: |
        npm run test:deep-critical
      env:
        BROWSER: ${{ matrix.browser }}

    - name: Run Deep Functionality Tests - Characters
      if: github.event.inputs.test_suite == 'characters'
      run: |
        npx playwright test tests/deep-functionality/01-characters-deep.spec.js --project=${{ matrix.browser }}

    - name: Run Deep Functionality Tests - Hardware
      if: github.event.inputs.test_suite == 'hardware'
      run: |
        npx playwright test tests/deep-functionality/02-hardware-parts-deep.spec.js --project=${{ matrix.browser }}

    - name: Run Deep Functionality Tests - AI Management
      if: github.event.inputs.test_suite == 'ai'
      run: |
        npx playwright test tests/deep-functionality/03-ai-management-deep.spec.js --project=${{ matrix.browser }}

    - name: Run Deep Functionality Tests - Sounds
      if: github.event.inputs.test_suite == 'sounds'
      run: |
        npx playwright test tests/deep-functionality/04-sounds-deep.spec.js --project=${{ matrix.browser }}

    - name: Run Deep Functionality Tests - ChatterPi
      if: github.event.inputs.test_suite == 'chatterpi'
      run: |
        npx playwright test tests/deep-functionality/07-chatterpi-deep.spec.js --project=${{ matrix.browser }}

    - name: Run Deep Functionality Tests - Integration
      if: github.event.inputs.test_suite == 'integration'
      run: |
        npx playwright test tests/deep-functionality/08-integration-deep.spec.js --project=${{ matrix.browser }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: deep-functionality-test-results-${{ matrix.node-version }}-${{ matrix.browser }}
        path: |
          test-results/
          playwright-report/
        retention-days: 30

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-screenshots-${{ matrix.node-version }}-${{ matrix.browser }}
        path: test-results/screenshots/
        retention-days: 7

    - name: Generate test summary
      if: always()
      run: |
        echo "## Deep Functionality Test Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Node.js Version**: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Browser**: ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Suite**: ${{ github.event.inputs.test_suite || 'all' }}" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "test-results/reports/deep-functionality-report.json" ]; then
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          node -e "
            const report = JSON.parse(require('fs').readFileSync('test-results/reports/deep-functionality-report.json', 'utf8'));
            console.log(\`- **Total Suites**: \${report.summary.totalSuites}\`);
            console.log(\`- **Passed**: \${report.summary.passedSuites}\`);
            console.log(\`- **Failed**: \${report.summary.failedSuites}\`);
            console.log(\`- **Success Rate**: \${Math.round((report.summary.passedSuites / report.summary.totalSuites) * 100)}%\`);
            console.log(\`- **Duration**: \${Math.round(report.summary.duration / 1000)}s\`);
          " >> $GITHUB_STEP_SUMMARY
        fi

    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let comment = `## 🧪 Deep Functionality Test Results\n\n`;
          comment += `**Configuration**: Node.js ${{ matrix.node-version }} + ${{ matrix.browser }}\n`;
          comment += `**Test Suite**: ${{ github.event.inputs.test_suite || 'all' }}\n\n`;
          
          try {
            const reportPath = 'test-results/reports/deep-functionality-report.json';
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              
              comment += `### 📊 Summary\n`;
              comment += `- **Total Suites**: ${report.summary.totalSuites}\n`;
              comment += `- **✅ Passed**: ${report.summary.passedSuites}\n`;
              comment += `- **❌ Failed**: ${report.summary.failedSuites}\n`;
              comment += `- **⏭️ Skipped**: ${report.summary.skippedSuites}\n`;
              comment += `- **🎯 Success Rate**: ${Math.round((report.summary.passedSuites / report.summary.totalSuites) * 100)}%\n`;
              comment += `- **⏱️ Duration**: ${Math.round(report.summary.duration / 1000)}s\n\n`;
              
              if (report.suites.failed.length > 0) {
                comment += `### ❌ Failed Suites\n`;
                report.suites.failed.forEach(suite => {
                  comment += `- **${suite.name}**: ${suite.error}\n`;
                });
                comment += `\n`;
              }
              
              if (report.summary.passedSuites === report.summary.totalSuites) {
                comment += `🎉 **All tests passed!** MonsterBox functionality is working correctly.\n`;
              } else if (report.summary.passedSuites / report.summary.totalSuites >= 0.8) {
                comment += `✅ **Most tests passed.** Minor issues detected that should be reviewed.\n`;
              } else {
                comment += `⚠️ **Significant issues detected.** Please review failed tests before merging.\n`;
              }
            } else {
              comment += `⚠️ Test report not found. Tests may have failed to complete.\n`;
            }
          } catch (error) {
            comment += `❌ Error reading test results: ${error.message}\n`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  performance-tests:
    runs-on: ubuntu-latest
    needs: deep-functionality-tests
    if: github.event_name == 'schedule' || github.event.inputs.test_suite == 'all'
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        npx playwright install --with-deps chromium

    - name: Start MonsterBox application
      run: |
        npm start &
        sleep 30
        timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'
      env:
        NODE_ENV: test

    - name: Run Performance Tests
      run: |
        npx playwright test tests/deep-functionality/08-integration-deep.spec.js --grep "Performance Under Load" --project=chromium

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: test-results/
        retention-days: 14

  security-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate

    - name: Check for sensitive data in tests
      run: |
        # Check for hardcoded API keys or sensitive data in test files
        if grep -r "sk-" tests/ || grep -r "api_key.*=" tests/ || grep -r "password.*=" tests/; then
          echo "❌ Potential sensitive data found in test files"
          exit 1
        else
          echo "✅ No sensitive data detected in test files"
        fi

    - name: Validate test data cleanup
      run: |
        # Ensure test data factory has proper cleanup
        if ! grep -q "cleanup" tests/utils/test-data-factory.js; then
          echo "⚠️ Test data factory should include cleanup methods"
        else
          echo "✅ Test data cleanup methods found"
        fi
