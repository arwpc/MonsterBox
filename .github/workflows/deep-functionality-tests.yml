name: MonsterBox Deep Functionality Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - system
          - browser
          - integration
      headed:
        description: 'Run tests in headed mode (browser tests only)'
        required: false
        default: false
        type: boolean

jobs:
  deep-functionality-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    env:
      ELEVENLABS_API_KEY: test-dummy-key

    strategy:
      matrix:
        node-version: [20.x]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install ffmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Unit Tests
      if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'unit' || github.event.inputs.test_suite == ''
      run: npm run test:unit

    - name: Run System Tests
      if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'system' || github.event.inputs.test_suite == ''
      run: npm run test:system

    - name: Run Browser Tests
      if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'browser' || github.event.inputs.test_suite == ''
      run: npm run test:browser
      env:
        HEADED: ${{ github.event.inputs.headed || 'false' }}

    - name: Run Integration Tests
      if: github.event.inputs.test_suite == 'integration'
      run: |
        MB_TEST_MODE=1 npm start &
        APP_PID=$!
        sleep 15
        # Wait for application to be ready
        for i in {1..30}; do
          if curl -f http://localhost:3000 2>/dev/null; then
            echo "Application is ready"
            break
          fi
          echo "Waiting for application... attempt $i/30"
          sleep 2
        done
        # Run integration tests here if you have them
        npm run test:system
        kill $APP_PID 2>/dev/null || true
      env:
        NODE_ENV: test
        PORT: 3000

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.node-version }}
        path: |
          playwright-report/
          test-results/
        retention-days: 30

    - name: Generate test summary
      if: always()
      run: |
        echo "## Deep Functionality Test Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Node.js Version**: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Suite**: ${{ github.event.inputs.test_suite || 'all' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: Tests completed" >> $GITHUB_STEP_SUMMARY
