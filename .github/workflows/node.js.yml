# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SKIP_CI_INTEGRATION: true
      NODE_ENV: test
      PORT: 3000
      SESSION_SECRET: test-session-secret-for-ci
      ANTHROPIC_API_KEY: your_anthropic_api_key_here
      ELEVENLABS_API_KEY: your_elevenlabs_api_key_here
      GOOGLE_API_KEY: your_google_api_key_here
      REPLICA_API_KEY: your_replica_api_key_here
      PERPLEXITY_API_KEY: your_perplexity_api_key_here
      MISTRAL_API_KEY: your_mistral_key_here
      XAI_API_KEY: YOUR_XAI_KEY_HERE
      OLLAMA_API_KEY: your_ollama_api_key_here

    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Run Unit Tests
      run: npm run test:unit
    - name: Start MonsterBox Server
      run: |
        MB_TEST_MODE=1 npm start &
        APP_PID=$!
        echo $APP_PID > server.pid
        sleep 10
      env:
        NODE_ENV: test
        PORT: 3000
    - name: Wait for Server
      run: |
        for i in {1..30}; do
          if curl -f http://localhost:3000 2>/dev/null; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... attempt $i/30"
          sleep 2
        done
        echo "Server failed to start"
        exit 1
    - name: Run Demo E2E (PW_CLEAN_SERVER=1)
      env:
        PW_CLEAN_SERVER: 1
      run: npm run test:ui -- tests/playwright/demo.spec.js
    - name: Run Conversation Mode Tests
      env:
        MB_E2E: 1
      run: npm run test:conversation
    - name: Stop Server
      if: always()
      run: |
        if [ -f server.pid ]; then
          kill $(cat server.pid) || true
          rm server.pid
        fi
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.node-version }}
        path: test-results/
        retention-days: 30
    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.node-version }}
        path: playwright-report/
        retention-days: 30
