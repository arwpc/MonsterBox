name: SSH-Based Deployment Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target (leave empty for all)'
        required: false
        default: ''
      force_deploy:
        description: 'Force deployment even if tests fail'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  ELEVENLABS_API_KEY: test-dummy-key

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Node.js dependencies
      run: npm ci
      
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run linting
      run: |
        if npm run lint --if-present; then
          echo "✅ Linting passed"
        else
          echo "❌ Linting failed"
          exit 1
        fi

    - name: Run unit tests
      run: npm run test:unit

    - name: Run system tests
      run: npm run test:system

    - name: Run browser tests
      run: npm run test:browser
        
    - name: Run integration tests
      run: |
        if npm run test:integration --if-present; then
          echo "✅ Integration tests passed"
        else
          echo "⚠️ Integration tests not available or failed"
        fi
        
    - name: Generate test coverage
      run: |
        if npm run coverage --if-present; then
          echo "✅ Coverage generated"
        else
          echo "⚠️ Coverage not available"
        fi
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results.xml
          coverage/
        retention-days: 30

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run npm audit
      run: |
        npm audit --audit-level=critical || echo "⚠️ Non-critical audit findings detected"
        
    - name: Run security scan
      run: |
        if npm run security-scan --if-present; then
          echo "✅ Security scan passed"
        else
          echo "⚠️ Security scan not available"
        fi

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: |
        if npm run build --if-present; then
          echo "✅ Build completed"
        else
          echo "⚠️ No build script available"
        fi
        
    - name: Create deployment package
      run: |
        # Create deployment package excluding development files
        # tar exit code 1 = "file changed as we read it" (harmless in CI)
        tar -czf monsterbox-deployment.tar.gz \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=.github \
          --exclude=tests \
          --exclude=coverage \
          --exclude=*.log \
          --exclude=.env.local \
          --exclude=.env.development \
          --exclude=monsterbox-deployment.tar.gz \
          . || [[ $? -eq 1 ]]

    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: monsterbox-deployment.tar.gz
        retention-days: 30

  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    environment: development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
        
    - name: Add SSH known hosts
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
        
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq
      
    - name: Configure deployment
      run: |
        # Create deployment configuration for development
        cat > scripts/deployment/deployment-config.json << EOF
        {
          "targets": [
            {
              "name": "development",
              "host": "${{ secrets.DEV_HOST }}",
              "user": "${{ secrets.DEV_USER }}",
              "ssh_key": "~/.ssh/id_rsa",
              "branch": "develop",
              "pre_deploy_commands": [
                "sudo systemctl stop monsterbox || true"
              ],
              "post_deploy_commands": [
                "npm install --production",
                "sudo systemctl start monsterbox",
                "sudo systemctl enable monsterbox"
              ],
              "health_check_url": "http://localhost:3000/health",
              "timeout": 300
            }
          ],
          "deployment": {
            "backup_enabled": true,
            "backup_retention_days": 7,
            "rollback_enabled": true,
            "health_check_enabled": true,
            "parallel_deployment": false
          }
        }
        EOF
        
    - name: Make deployment script executable
      run: chmod +x scripts/deployment/ssh-deploy.sh
      
    - name: Deploy to development
      run: |
        target="${{ github.event.inputs.target }}"
        if [[ -n "$target" ]]; then
          ./scripts/deployment/ssh-deploy.sh deploy "$target"
        else
          ./scripts/deployment/ssh-deploy.sh deploy development
        fi
        
    - name: Verify deployment
      run: |
        ./scripts/deployment/ssh-deploy.sh status

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-development]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
        
    - name: Add SSH known hosts
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
        
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq
      
    - name: Configure deployment
      run: |
        # Create deployment configuration for production
        cat > scripts/deployment/deployment-config.json << EOF
        {
          "targets": [
            {
              "name": "production-1",
              "host": "${{ secrets.PROD_HOST_1 }}",
              "user": "${{ secrets.PROD_USER }}",
              "ssh_key": "~/.ssh/id_rsa",
              "branch": "main",
              "pre_deploy_commands": [
                "sudo systemctl stop monsterbox || true"
              ],
              "post_deploy_commands": [
                "npm install --production",
                "sudo systemctl start monsterbox",
                "sudo systemctl enable monsterbox"
              ],
              "health_check_url": "http://localhost:3000/health",
              "timeout": 300
            },
            {
              "name": "production-2",
              "host": "${{ secrets.PROD_HOST_2 }}",
              "user": "${{ secrets.PROD_USER }}",
              "ssh_key": "~/.ssh/id_rsa",
              "branch": "main",
              "pre_deploy_commands": [
                "sudo systemctl stop monsterbox || true"
              ],
              "post_deploy_commands": [
                "npm install --production",
                "sudo systemctl start monsterbox",
                "sudo systemctl enable monsterbox"
              ],
              "health_check_url": "http://localhost:3000/health",
              "timeout": 300
            }
          ],
          "deployment": {
            "backup_enabled": true,
            "backup_retention_days": 30,
            "rollback_enabled": true,
            "health_check_enabled": true,
            "parallel_deployment": false
          }
        }
        EOF
        
    - name: Make deployment script executable
      run: chmod +x scripts/deployment/ssh-deploy.sh
      
    - name: Deploy to production
      run: |
        target="${{ github.event.inputs.target }}"
        if [[ -n "$target" ]]; then
          ./scripts/deployment/ssh-deploy.sh deploy "$target"
        else
          ./scripts/deployment/ssh-deploy.sh deploy
        fi
        
    - name: Verify deployment
      run: |
        ./scripts/deployment/ssh-deploy.sh status
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "🚀 Production deployment completed successfully!"
        echo "Deployment log available in workflow artifacts"
        
    - name: Notify deployment failure
      if: failure()
      run: |
        echo "❌ Production deployment failed!"
        echo "Check logs and consider rollback if necessary"

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
        
    - name: Add SSH known hosts
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
        
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq
      
    - name: Configure rollback
      run: |
        # Use production configuration for rollback
        cat > scripts/deployment/deployment-config.json << EOF
        {
          "targets": [
            {
              "name": "production-1",
              "host": "${{ secrets.PROD_HOST_1 }}",
              "user": "${{ secrets.PROD_USER }}",
              "ssh_key": "~/.ssh/id_rsa"
            },
            {
              "name": "production-2",
              "host": "${{ secrets.PROD_HOST_2 }}",
              "user": "${{ secrets.PROD_USER }}",
              "ssh_key": "~/.ssh/id_rsa"
            }
          ]
        }
        EOF
        
    - name: Make deployment script executable
      run: chmod +x scripts/deployment/ssh-deploy.sh
      
    - name: Perform rollback
      run: |
        target="${{ github.event.inputs.target }}"
        if [[ -n "$target" ]]; then
          ./scripts/deployment/ssh-deploy.sh rollback "$target"
        else
          echo "Target required for rollback operation"
          exit 1
        fi
        
    - name: Verify rollback
      run: |
        ./scripts/deployment/ssh-deploy.sh status
