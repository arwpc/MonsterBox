site_name: MonsterBox Documentation
site_url: https://arwpc.github.io/MonsterBox/
docs_dir: .
site_dir: ../mkdocs-site
theme:
  name: material
  palette:
    primary: indigo
    accent: deep orange
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Installation: install.md
  - Usage Guide: usage.md
  - Configuration: config.md
  - Directory Structure: structure.md
  - FAQ / Troubleshooting: faq.md
  - Networking: networking.md
  - License: license.md

  - Character Sheets:
      - Orlok: character_orlok.md
      - Coffin Breaker: character_coffin_breaker.md
      - PumpkinHead: character_pumpkinhead.md
      - PumpkinHead Parts List: characters/PUMPKINHEAD_COMPLETE_PARTS_LIST.md
      - Groundbreaker Setup: characters/GROUNDBREAKER_SETUP_INSTRUCTIONS.md
      - Groundbreaker Installation: characters/GROUNDBREAKER_INSTALLATION_PACKAGE.md

  - Setup Guides:
      - Animatronic Setup: setup/ANIMATRONIC-SETUP-GUIDE.md
      - SSH Setup: setup/ANIMATRONIC-SSH-SETUP.md
      - Head Tracking Setup: setup/HEAD-TRACKING-SETUP.md
      - Linear Actuator Calibration: setup/LINEAR_ACTUATOR_CALIBRATION.md
      - STT Tuning Guide: setup/STT_TUNING_GUIDE.md
      - Noisy Environment Preset: setup/Noisy_Environment_Preset_Guide.md
      - Port Management: setup/CENTRALIZED-PORT-MANAGEMENT-SYSTEM.md
      - Port Management UI: setup/PORT-MANAGEMENT-INTERFACE-GUIDE.md
      - HTTPS Deployment: setup/HTTPS_DEPLOYMENT_HANDOFF.md
      - Secure Remote Access: setup/secure-remote-access-system.md
      - MCP Log Collection: setup/MCP-LOG-COLLECTION-SETUP.md

  - Hardware:
